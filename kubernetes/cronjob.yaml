apiVersion: batch/v1
kind: CronJob
metadata:
  name: mbta-kendall-cronjob
spec:
  schedule: "*/30 * * * *"
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: mbta-kendall-tracker
              image: mbta-kendall-tracker:latest
              imagePullPolicy: IfNotPresent
              envFrom:
                - configMapRef:
                    name: mbta-kendall-config
                - secretRef:
                    name: mbta-kendall-secret
